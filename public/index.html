<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ð¬ Movie Night List</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --card-hover: #1e1e2e;
      --border: #2a2a3d;
      --gold: #e8c46a;
      --gold-dim: #a88c48;
      --red: #e85d4a;
      --green: #4ae8a0;
      --text: #f0eee8;
      --muted: #7a7a9a;
      --horror: #c44ae8;
      --drag-bg: rgba(232,196,106,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    .page { max-width: 860px; margin: 0 auto; padding: 0 40px; }

    header {
      padding-top: 60px;
      padding-bottom: 32px;
      animation: fadeDown 0.8s ease both;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
      opacity: 0.8;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 7vw, 72px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 em { font-style: italic; color: var(--gold); }

    .subtitle {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .sync-status {
      display: inline-block;
      margin-left: 8px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 2px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .sync-status.synced { color: var(--green); border: 1px solid rgba(74,232,160,0.3); background: rgba(74,232,160,0.08); }
    .sync-status.syncing { color: var(--gold); border: 1px solid rgba(232,196,106,0.3); background: rgba(232,196,106,0.08); }
    .sync-status.offline { color: var(--red); border: 1px solid rgba(232,93,74,0.3); background: rgba(232,93,74,0.08); }

    /* Stats row */
    .stats {
      display: flex;
      gap: 28px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .stat { display: flex; flex-direction: column; gap: 4px; }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--gold);
      transition: all 0.3s;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Progress bar */
    .progress-bar-wrap {
      margin-bottom: 28px;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Add movie form â prominent at top */
    .add-section {
      margin-bottom: 32px;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .add-form {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      background: var(--card);
      transition: border-color 0.2s;
      border-radius: 3px;
      overflow: hidden;
    }

    .add-form:focus-within { border-color: var(--gold-dim); }

    .add-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.03em;
      padding: 14px 20px;
      min-width: 0;
    }

    .add-input::placeholder { color: var(--muted); }

    .horror-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 14px;
      border-left: 1px solid var(--border);
      transition: color 0.2s;
      white-space: nowrap;
    }

    .horror-toggle input { display: none; }
    .horror-toggle.active { color: var(--horror); }

    .add-btn {
      background: var(--gold);
      color: #0a0a0f;
      border: none;
      padding: 14px 24px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .add-btn:hover { background: #f0d07a; }
    .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Section labels */
    .section-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-label .count {
      color: var(--gold);
      font-weight: 500;
    }

    /* Movie list */
    .list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 40px;
      min-height: 60px;
    }

    .movie-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: all 0.25s ease;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .movie-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(232,196,106,0.03), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .movie-item:hover::before { opacity: 1; }
    .movie-item:hover { border-color: var(--gold-dim); border-left-color: var(--gold); }

    .movie-item.watched {
      border-left-color: var(--green);
      opacity: 0.6;
    }

    .movie-item.watched .movie-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .movie-item.hidden { display: none; }

    /* Drag handle */
    .drag-handle {
      display: flex;
      flex-direction: column;
      gap: 2px;
      cursor: grab;
      padding: 6px 4px;
      opacity: 0.25;
      transition: opacity 0.2s;
      flex-shrink: 0;
      touch-action: none;
    }

    .drag-handle:hover, .drag-handle:active { opacity: 0.7; }

    .drag-handle span {
      display: block;
      width: 14px;
      height: 2px;
      background: var(--muted);
      border-radius: 1px;
    }

    .movie-item.dragging {
      opacity: 0.4;
      border-color: var(--gold);
      background: var(--drag-bg);
    }

    .movie-item.drag-over {
      border-top: 2px solid var(--gold);
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s;
      font-size: 12px;
    }

    .movie-item.watched .checkbox {
      background: var(--green);
      border-color: var(--green);
      color: #0a0a0f;
    }

    .movie-num {
      font-size: 11px;
      color: var(--border);
      width: 20px;
      flex-shrink: 0;
      text-align: right;
      font-weight: 500;
    }

    .movie-title {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: color 0.2s;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .tag-horror {
      background: rgba(196,74,232,0.15);
      color: var(--horror);
      border: 1px solid rgba(196,74,232,0.3);
    }

    .watched-time {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }

    .movie-item.watched .watched-time { opacity: 1; }

    /* Watched section â collapsible */
    .watched-section { margin-bottom: 60px; }

    .watched-toggle-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-bottom: 12px;
    }

    .watched-toggle-btn:hover {
      border-color: var(--gold-dim);
      color: var(--text);
    }

    .watched-toggle-btn .arrow {
      transition: transform 0.3s;
      font-size: 8px;
    }

    .watched-toggle-btn.open .arrow { transform: rotate(90deg); }

    .watched-list {
      display: none;
      flex-direction: column;
      gap: 2px;
    }

    .watched-list.open { display: flex; }

    .watched-list .movie-item {
      opacity: 0.5;
    }

    .watched-list .movie-item:hover { opacity: 0.7; }

    /* Empty states */
    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 48px 20px;
      letter-spacing: 0.08em;
      border: 1px dashed var(--border);
      border-radius: 3px;
    }

    .empty-state .emoji { font-size: 28px; display: block; margin-bottom: 12px; }

    .loading-msg {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 60px 20px;
      letter-spacing: 0.1em;
    }

    .loading-msg .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    /* Animations */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { opacity: 0; transform: translateX(-10px) scale(0.97); } 100% { opacity: 1; transform: translateX(0) scale(1); } }
    .movie-item.new-item { animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    /* Responsive */
    @media (max-width: 600px) {
      .page { padding: 0 16px; }
      header { padding-top: 36px; padding-bottom: 24px; }
      h1 { font-size: 32px; }
      .stats { gap: 16px; }
      .stat-num { font-size: 22px; }
      .movie-item { padding: 12px 12px; gap: 10px; }
      .movie-title { font-size: 13px; }
      .movie-num { display: none; }
      .add-form { flex-wrap: wrap; }
      .add-input { min-width: 100%; padding: 12px 16px; }
      .horror-toggle { border-left: none; border-top: 1px solid var(--border); padding: 10px 16px; flex: 1; }
      .add-btn { flex: 1; text-align: center; padding: 12px; }
      .tag { font-size: 8px; padding: 2px 6px; }
      .watched-time { font-size: 9px; }
      .drag-handle { padding: 4px 2px; }
      .drag-handle span { width: 10px; }
    }

    @media (max-width: 380px) {
      .page { padding: 0 12px; }
      h1 { font-size: 28px; }
      .movie-item { padding: 10px; gap: 8px; }
      .movie-title { font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="page">
  <header>
    <p class="eyebrow">â¦ Jai's Server Â· #movie-list</p>
    <h1>Movie <em>Night</em><br>Watchlist</h1>
    <p class="subtitle">
      Drag to prioritize Â· Click to mark watched
      <span class="sync-status syncing" id="sync-status">connecting...</span>
    </p>
    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="total-count">0</span>
        <span class="stat-label">Total Films</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="watched-count">0</span>
        <span class="stat-label">Watched</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="remaining-count">0</span>
        <span class="stat-label">Remaining</span>
      </div>
    </div>
  </header>

  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="add-section">
    <div class="add-form">
      <input class="add-input" id="movie-input" type="text" placeholder="Add a movie..." autocomplete="off"/>
      <label class="horror-toggle" id="horror-label">
        <input type="checkbox" id="horror-check"/> ð® Horror
      </label>
      <button class="add-btn" id="add-btn" onclick="addMovie()">+ Add</button>
    </div>
  </div>

  <div class="section-label">
    <span>Up Next <span class="count" id="unwatched-label-count"></span></span>
  </div>
  <div class="list" id="unwatched-list">
    <div class="loading-msg"><span class="spinner"></span>Loading movies...</div>
  </div>

  <div class="watched-section" id="watched-section" style="display:none;">
    <button class="watched-toggle-btn" id="watched-toggle-btn" onclick="toggleWatchedSection()">
      <span class="arrow">â¶</span>
      Already Watched <span id="watched-label-count"></span>
    </button>
    <div class="watched-list" id="watched-list"></div>
  </div>
</div>

<script>
  const API_URL = "/api/movies";

  const initialMovies = [
    { title: "Night Crawler", horror: false, watched: false },
    { title: "Shawshank Redemption", horror: false, watched: false },
    { title: "Whiplash", horror: false, watched: false },
    { title: "Happy Death Day", horror: true, watched: false },
    { title: "Harry Potter", horror: false, watched: false },
    { title: "Dune", horror: false, watched: false },
    { title: "Zodiac", horror: false, watched: false },
    { title: "Prisoners", horror: false, watched: false },
    { title: "Sicario", horror: false, watched: false },
    { title: "Marty Supereme", horror: false, watched: false },
    { title: "The Martian", horror: false, watched: false },
    { title: "Moneyball", horror: false, watched: false },
    { title: "The Bride of Frankenstein 2026", horror: true, watched: false },
    { title: "21", horror: false, watched: false },
  ];

  let movies = [];
  let isLoading = true;
  let watchedOpen = false;
  let dragSrcIndex = null;

  // --- Sync Status ---
  function setSyncStatus(state, text) {
    const el = document.getElementById('sync-status');
    el.className = 'sync-status ' + state;
    el.textContent = text || state;
  }

  // --- API ---
  async function apiFetch() {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (data.status === "ok") return data.movies;
    throw new Error(data.message || "Failed to fetch");
  }

  async function apiPost(body) {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    return await res.json();
  }

  // --- Load movies ---
  async function loadMovies() {
    try {
      setSyncStatus("syncing", "syncing...");
      const data = await apiFetch();
      if (data.length === 0) {
        setSyncStatus("syncing", "seeding...");
        await apiPost({ action: "sync", movies: initialMovies });
        movies = [...initialMovies];
      } else {
        movies = data;
      }
      isLoading = false;
      setSyncStatus("synced", "live");
      render();
    } catch (err) {
      console.error("Load error:", err);
      setSyncStatus("offline", "offline");
      movies = [...initialMovies];
      isLoading = false;
      render();
    }
  }

  // --- Render: split into unwatched + watched ---
  function render() {
    const unwatchedList = document.getElementById('unwatched-list');
    const watchedList = document.getElementById('watched-list');
    const watchedSection = document.getElementById('watched-section');

    unwatchedList.innerHTML = '';
    watchedList.innerHTML = '';

    const unwatched = [];
    const watched = [];
    movies.forEach((m, i) => {
      if (m.watched) watched.push({ ...m, originalIndex: i });
      else unwatched.push({ ...m, originalIndex: i });
    });

    // Render unwatched
    if (unwatched.length === 0 && !isLoading) {
      unwatchedList.innerHTML = '<div class="empty-state"><span class="emoji">ð</span>All caught up! Add more movies above.</div>';
    } else {
      unwatched.forEach((m, vi) => {
        unwatchedList.appendChild(createMovieEl(m, m.originalIndex, vi + 1, true));
      });
    }

    // Render watched
    if (watched.length > 0) {
      watchedSection.style.display = '';
      document.getElementById('watched-label-count').textContent = `(${watched.length})`;
      watched.forEach((m, vi) => {
        watchedList.appendChild(createMovieEl(m, m.originalIndex, vi + 1, false));
      });
    } else {
      watchedSection.style.display = 'none';
    }

    document.getElementById('unwatched-label-count').textContent = `(${unwatched.length})`;
    updateStats();
  }

  function createMovieEl(m, originalIndex, displayNum, draggable) {
    const item = document.createElement('div');
    item.className = 'movie-item' + (m.watched ? ' watched' : '');
    item.dataset.index = originalIndex;

    const watchedStr = m.watchedAt
      ? new Date(m.watchedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : '';

    // Build inner HTML
    let html = '';
    if (draggable) {
      html += `<div class="drag-handle" draggable="true"><span></span><span></span><span></span></div>`;
    }
    html += `<div class="checkbox" onclick="toggle(${originalIndex})">${m.watched ? 'â' : ''}</div>`;
    html += `<span class="movie-num">${String(displayNum).padStart(2, '0')}</span>`;
    html += `<span class="movie-title">${m.title}</span>`;
    if (m.horror) html += `<span class="tag tag-horror">Horror</span>`;
    html += `<span class="watched-time">${watchedStr}</span>`;

    item.innerHTML = html;

    // Click on the row (not drag handle) toggles watched
    item.addEventListener('click', (e) => {
      if (e.target.closest('.drag-handle')) return;
      toggle(originalIndex);
    });

    // Drag events (only for unwatched)
    if (draggable) {
      const handle = item.querySelector('.drag-handle');

      handle.addEventListener('dragstart', (e) => {
        dragSrcIndex = originalIndex;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', originalIndex);
      });

      handle.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        dragSrcIndex = null;
      });

      item.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const targetIndex = parseInt(item.dataset.index);
        if (targetIndex !== dragSrcIndex) {
          item.classList.add('drag-over');
        }
      });

      item.addEventListener('dragleave', () => {
        item.classList.remove('drag-over');
      });

      item.addEventListener('drop', (e) => {
        e.preventDefault();
        item.classList.remove('drag-over');
        const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
        const toIndex = parseInt(item.dataset.index);
        if (fromIndex !== toIndex) {
          reorderMovie(fromIndex, toIndex);
        }
      });

      // Touch drag support
      let touchStartY = 0;
      let touchClone = null;
      let touchCurrentTarget = null;

      handle.addEventListener('touchstart', (e) => {
        e.preventDefault();
        dragSrcIndex = originalIndex;
        touchStartY = e.touches[0].clientY;
        item.classList.add('dragging');

        touchClone = item.cloneNode(true);
        touchClone.style.position = 'fixed';
        touchClone.style.zIndex = '1000';
        touchClone.style.width = item.offsetWidth + 'px';
        touchClone.style.opacity = '0.8';
        touchClone.style.pointerEvents = 'none';
        touchClone.style.left = item.getBoundingClientRect().left + 'px';
        touchClone.style.top = e.touches[0].clientY - 25 + 'px';
        document.body.appendChild(touchClone);
      }, { passive: false });

      handle.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!touchClone) return;
        touchClone.style.top = e.touches[0].clientY - 25 + 'px';

        // Find element under touch
        touchClone.style.display = 'none';
        const elBelow = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        touchClone.style.display = '';

        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        if (elBelow) {
          const targetItem = elBelow.closest('.movie-item');
          if (targetItem && targetItem !== item && targetItem.closest('#unwatched-list')) {
            targetItem.classList.add('drag-over');
            touchCurrentTarget = targetItem;
          } else {
            touchCurrentTarget = null;
          }
        }
      }, { passive: false });

      handle.addEventListener('touchend', (e) => {
        item.classList.remove('dragging');
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

        if (touchClone) {
          touchClone.remove();
          touchClone = null;
        }

        if (touchCurrentTarget && dragSrcIndex !== null) {
          const toIndex = parseInt(touchCurrentTarget.dataset.index);
          if (dragSrcIndex !== toIndex) {
            reorderMovie(dragSrcIndex, toIndex);
          }
        }
        dragSrcIndex = null;
        touchCurrentTarget = null;
      });
    }

    return item;
  }

  // --- Reorder ---
  async function reorderMovie(fromIndex, toIndex) {
    // Move the movie in the array
    const movedItem = movies.splice(fromIndex, 1)[0];
    // Adjust toIndex if needed
    const adjustedTo = toIndex > fromIndex ? toIndex - 1 : toIndex;
    movies.splice(adjustedTo, 0, movedItem);
    render();

    // Persist to backend
    try {
      setSyncStatus("syncing", "saving...");
      await apiPost({ action: "sync", movies: movies });
      setSyncStatus("synced", "live");
    } catch (err) {
      console.error("Reorder error:", err);
      setSyncStatus("offline", "offline");
    }
  }

  // --- Toggle watched ---
  async function toggle(i) {
    movies[i].watched = !movies[i].watched;
    movies[i].watchedAt = movies[i].watched ? new Date().toISOString() : null;
    render();

    try {
      setSyncStatus("syncing", "saving...");
      await apiPost({ action: "toggle", index: i });
      setSyncStatus("synced", "live");
    } catch (err) {
      console.error("Toggle error:", err);
      setSyncStatus("offline", "offline");
      movies[i].watched = !movies[i].watched;
      movies[i].watchedAt = movies[i].watched ? new Date().toISOString() : null;
      render();
    }
  }

  // --- Stats ---
  function updateStats() {
    const total = movies.length;
    const watched = movies.filter(m => m.watched).length;
    const remaining = total - watched;
    const pct = total ? Math.round((watched / total) * 100) : 0;

    document.getElementById('total-count').textContent = total;
    document.getElementById('watched-count').textContent = watched;
    document.getElementById('remaining-count').textContent = remaining;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  // --- Toggle watched section ---
  function toggleWatchedSection() {
    watchedOpen = !watchedOpen;
    document.getElementById('watched-list').classList.toggle('open', watchedOpen);
    document.getElementById('watched-toggle-btn').classList.toggle('open', watchedOpen);
  }

  // --- Add movie ---
  async function addMovie() {
    const input = document.getElementById('movie-input');
    const isHorror = document.getElementById('horror-check').checked;
    const title = input.value.trim();
    if (!title) return;

    const btn = document.getElementById('add-btn');
    btn.disabled = true;

    movies.push({ title, horror: isHorror, watched: false });
    input.value = '';
    document.getElementById('horror-check').checked = false;
    document.getElementById('horror-label').classList.remove('active');
    render();

    // Scroll to the new item
    const list = document.getElementById('unwatched-list');
    const last = list.lastElementChild;
    if (last) {
      last.classList.add('new-item');
      last.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    try {
      setSyncStatus("syncing", "saving...");
      await apiPost({ action: "add", title, horror: isHorror });
      setSyncStatus("synced", "live");
    } catch (err) {
      console.error("Add error:", err);
      setSyncStatus("offline", "offline");
    }

    btn.disabled = false;
  }

  // --- Auto-refresh every 15s ---
  setInterval(async () => {
    try {
      const data = await apiFetch();
      if (data && data.length > 0) {
        let changed = false;
        if (data.length !== movies.length) {
          changed = true;
        } else {
          for (let i = 0; i < data.length; i++) {
            if (data[i].watched !== movies[i].watched || data[i].title !== movies[i].title) {
              changed = true;
              break;
            }
          }
        }
        if (changed) {
          movies = data;
          render();
        }
        setSyncStatus("synced", "live");
      }
    } catch (e) {}
  }, 15000);

  // --- Event listeners ---
  document.getElementById('horror-check').addEventListener('change', function() {
    document.getElementById('horror-label').classList.toggle('active', this.checked);
  });

  document.getElementById('movie-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addMovie();
  });

  // --- Init ---
  loadMovies();
</script>
</body>
</html>
